name: Daily CWA NOAA Data Update

on:
  schedule:
    # 每天台灣時間早上 6:30 自動執行 (對應 UTC 時間為前一天 22:30)
    - cron: '30 22 * * *'
  workflow_dispatch: # 開啟手動測試按鈕，讓你可以隨時點擊測試

jobs:
  run-r-script:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 複製程式碼到雲端虛擬機
        uses: actions/checkout@v4

      - name: 2. 安裝 R 語言環境
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # 啟用快速下載通道，安裝套件才快

      - name: 3. 安裝需要的 R 套件
        run: |
          Rscript -e 'install.packages(c("httr", "jsonlite", "dplyr", "tidyr", "purrr", "googlesheets4"))'

      - name: 4. 從保險箱取出 Google 金鑰並還原成檔案
        run: |
          echo '${{ secrets.GCP_KEY_JSON }}' > dengue-project-eic02-63f1bd69bb33.json

      - name: 5. 執行 R 爬蟲與上傳
        run: |
          Rscript main.R
